name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy clean build to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is not set"
            exit 1
          fi

          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          ROOT_DIR="$(pwd)"
          SPACE_DIR="$(mktemp -d)/hf-space"

          git clone "https://sherki-prerna:${HF_TOKEN}@huggingface.co/spaces/sherki-prerna/Samp" "${SPACE_DIR}"

          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude "hf-space/" \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            "${ROOT_DIR}/" "${SPACE_DIR}/"

          cd "${SPACE_DIR}"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Auto deploy from GitHub Actions"
          git push origin main
